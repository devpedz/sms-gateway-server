version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: sms_gateway_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASS}"
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASS}"
    volumes:
      - db_data:/var/lib/mysql

  server:
    image: ghcr.io/android-sms-gateway/server:latest
    container_name: sms_gateway_server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT}:3000"
    volumes:
      - ./config.yml:/app/config.yml
    env_file:
      - .env
    depends_on:
      - db

volumes:
  db_data: